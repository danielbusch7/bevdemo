<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BEV Demo – Faster Training, Fewer Labels</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  body {
    overflow-y: auto;      /* ✅ allow vertical scrolling */
  }

  /* Page frame */
  .page {
    padding-top: 6vh;      /* black gap on top */
    padding-bottom: 6vh;
    display: flex;
    justify-content: center;
  }

  /* Background container */
  .bg-container {
    position: relative;    /* ✅ anchor for absolute positioning */
    width: 90vw;           /* equal left/right margins */
    max-width: 1600px;
  }

  /* Full background image (NOT cropped) */
  .bg-container img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
  }

  /* Pixel-aligned video overlay */
  .overlay-video {
    position: absolute;

    /*  PIXEL ALIGNMENT */
    left: 523px;           /* X position in original image */
    top: 2016px;           /* Y position in original image */

    width: 3645px;          /* width in original pixels */

    z-index: 2;
  }

  .overlay-video video {
    width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 0 35px rgba(0,0,0,0.7);
  }

  /* ✅ SCALE PIXEL COORDINATES RESPONSIVELY */
  .bg-container {
    --scale: calc(100% / 4384); /* original image width */
  }

  .overlay-video {
    left: calc(523 * var(--scale));
    top:  calc(2016 * var(--scale));
    width: calc(3645 * var(--scale));
  }

  @media (max-width: 768px) {
    .bg-container {
      width: 96vw;
    }
  }
</style>
</head>

<body>

<div class="page">
  <div class="bg-container">

    <!-- Background image -->
    <img src="page_background.png" alt="Background">

    <!-- Pixel-aligned video -->
    <div class="overlay-video">
      <video autoplay loop muted playsinline controls preload="auto">
        <source src="paper2_short_nuscens_demo.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</div>

</body>
</html>
