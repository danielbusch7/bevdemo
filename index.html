
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BEV Demo – Faster Training, Fewer Labels</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  body {
    overflow-y: auto;
  }

  /* Page frame */
  .page {
    padding-top: 6vh;
    padding-bottom: 6vh;
    display: flex;
    flex-direction: column;    /* stack sections vertically */
    align-items: center;
    gap: 6vh;                  /* vertical spacing between blocks */
  }

  /* Background container */
  .bg-container {
    position: relative;
    width: 90vw;
    max-width: 1600px;

    /* original image width for scale */
    --scale: calc(100% / 4384);
  }

  /* Background image */
  .bg-container img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
  }

  /* Pixel-aligned video overlay */
  .overlay-video {
    position: absolute;
    z-index: 2;

    /* --- PIXEL COORDINATES (ORIGINAL IMAGE SPACE) --- */
    left: 521px;
    top: 2052px;
    width: 3645px;

    /* --- RESPONSIVE SCALING --- */
    left:  calc(521  * var(--scale));
    top:   calc(2052 * var(--scale));
    width: calc(3645 * var(--scale));
  }

  .overlay-video video {
    width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 0 35px rgba(0,0,0,0.7);
  }

  /* Horizontal separator (within margins) */
  .separator {
    width: 90vw;
    max-width: 1600px;
    height: 1px;
    background: rgba(255, 255, 255, 0.8);
  }

  @media (max-width: 768px) {
    .bg-container {
      width: 96vw;
    }

    .separator {
      width: 96vw;
    }
  }
</style>
</head>

<body>

<div class="page">

  <!-- ===== SECTION 1 ===== -->
  <div class="bg-container">
    <img src="page_background.png" alt="Background 1">

    <div class="overlay-video">
      <video autoplay loop muted playsinline controls preload="auto">
        <source src="paper2_short_nuscens_demo.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <!-- ===== SEPARATOR ===== -->
  <div class="separator"></div>

  <!-- ===== SECTION 2 ===== -->
  <div class="bg-container">
    <img src="page_background_02.png" alt="Background 2">

    <div class="overlay-video">
      <video autoplay loop muted playsinline controls preload="auto">
        <source src="paper1_short_nuscens_dem.mp4" type="video/mp4">
      </video>
    </div>
  </div>

</div>

</body>
</html>
