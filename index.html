<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BEV Demo – Faster Training, Fewer Labels</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Framed background image */
    .background {
      position: fixed;
      top: 6vh;                 /* black gap above */
      left: 5vw;
      right: 5vw;
      bottom: 5vh;

      background-image: url("page_background.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;

      border-radius: 10px;      /* subtle framing */
      z-index: 0;
    }

    /* Video placement relative to viewport */
    .video-container {
      position: fixed;
      left: 50%;
      bottom: 10vh;
      transform: translateX(-50%);
      z-index: 1;

      width: 72vw;
      max-width: 1100px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 0 35px rgba(0,0,0,0.7);
    }

    @media (max-width: 768px) {
      .background {
        left: 4vw;
        right: 4vw;
        top: 5vh;
      }

      .video-container {
        width: 95vw;
        bottom: 6vh;
      }
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <div class="video-container">
    <video autoplay loop muted playsinline controls preload="auto">
      <source src="paper2_short_nuscens_demo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

</body>
</html>
