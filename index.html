<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BEV Demo – Faster Training, Fewer Labels</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  body {
    overflow-y: auto;
  }

  /* Page frame */
  .page {
    padding-top: 6vh;
    padding-bottom: 6vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6vh;
  }

  /* Background container (20% smaller overall) */
  .bg-container {
    position: relative;
    width: 72vw;            /* was 90vw */
    max-width: 1280px;      /* was 1600px */

    /* original image width for scaling pixel coordinates */
    --scale: calc(100% / 4384);
  }

  /* Background image */
  .bg-container img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
  }

  /* Shared overlay video base */
  .overlay-video {
    position: absolute;
    z-index: 2;
  }

  .overlay-video video {
    width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 0 35px rgba(0,0,0,0.7);
  }

  /* ===== SECTION 1 VIDEO ALIGNMENT ===== */
  .section-1 .overlay-video {
    left:  calc(510  * var(--scale));
    top:   calc(2158 * var(--scale));
    width: calc(3645 * var(--scale));
  }

  /* ===== SECTION 2 VIDEO ALIGNMENT ===== */
  .section-2 .overlay-video {
    left:  calc(411  * var(--scale));   /* change as needed */
    top:   calc(1972 * var(--scale));   /* change as needed */
    width: calc(3375 * var(--scale));   /* change as needed */
  }

  /* Separator matching container width */
  .separator {
    width: 72vw;
    max-width: 1280px;
    height: 1px;
    background: rgba(255, 255, 255, 0.8);
  }

  @media (max-width: 768px) {
    .bg-container {
      width: 88vw;
    }

    .separator {
      width: 88vw;
    }
  }
</style>
</head>

<body>

<div class="page">

  <!-- ===== SECTION 1 ===== -->
  <div class="bg-container section-1">
    <img src="page_background.png" alt="Background 1">

    <div class="overlay-video">
      <video autoplay loop muted playsinline controls preload="auto">
        <source src="paper2_short_nuscens_demo.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <!-- ===== SEPARATOR ===== -->
  <div class="separator"></div>

  <!-- ===== SECTION 2 ===== -->
  <div class="bg-container section-2">
    <img src="page_background_02.png" alt="Background 2">

    <div class="overlay-video">
      <video autoplay loop muted playsinline controls preload="auto">
        <source src="paper1_short_nuscens_demo.mp4" type="video/mp4">
      </video>
    </div>
  </div>

</div>

</body>
</html>
